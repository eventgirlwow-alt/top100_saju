function machineMetrics(w,h){const mobile=w<520,s=Math.min(w/430,mobile?h/830:h/730,1.05),cx=w/2,baseY=h*(mobile?.72:.7),r=136*s;return{mobile,s,cx,baseY,r}}function isLeverHit(x,y){const{cx,baseY,s}=machineMetrics(innerWidth,innerHeight);return Math.hypot(x-cx,y-(baseY+48*s))<=52*s}let fallbackBgm=null;async function ensureAudioContext(){if(!audioCtx||audioCtx.state==="closed"){audioCtx=new (window.AudioContext||window.webkitAudioContext)();fallbackBgm=null;shuffleBuffer=null;shuffleSource=null;shuffleGain=null;}if(audioCtx.state==="suspended")try{await audioCtx.resume()}catch{}return audioCtx}function synthEffect(kind,level=1){if(!audioCtx||audioCtx.state!=="running")return;const now=audioCtx.currentTime,g=audioCtx.createGain();g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(Math.max(.001,.18*level),now+.008);g.gain.exponentialRampToValueAtTime(.0001,now+(kind==="tada"?.48:.09));g.connect(audioCtx.destination);const freqs=kind==="tada"?[523.25,659.25,783.99]:[1100];freqs.forEach((freq,i)=>{const o=audioCtx.createOscillator();o.type=kind==="click"?"square":"sine";o.frequency.setValueAtTime(freq,now+i*.045);if(kind==="click")o.frequency.exponentialRampToValueAtTime(260,now+.075);o.connect(g);o.start(now+i*.045);o.stop(now+(kind==="tada"?.5:.1))})}function startFallbackBgm(){if(fallbackBgm||!audioCtx||audioCtx.state!=="running")return;const gain=audioCtx.createGain(),low=audioCtx.createBiquadFilter(),o1=audioCtx.createOscillator(),o2=audioCtx.createOscillator();gain.gain.value=Math.max(.006,Number(volume.value)*.045);low.type="lowpass";low.frequency.value=520;o1.type="sine";o2.type="triangle";o1.frequency.value=110;o2.frequency.value=164.81;o1.connect(low);o2.connect(low);low.connect(gain);gain.connect(audioCtx.destination);o1.start();o2.start();fallbackBgm={gain,o1,o2}}async function playOverlap(audio,level=1,fallback="click"){await ensureAudioContext();const voice=audio.cloneNode();voice.volume=Math.max(0,Math.min(1,level));let used=false;const useFallback=()=>{if(used)return;used=true;synthEffect(fallback,level)};voice.addEventListener("error",useFallback,{once:true});try{const promise=voice.play();if(promise)await promise}catch{useFallback()}voice.addEventListener("ended",()=>voice.remove(),{once:true})}function machine(w,h,now,dt){const{mobile,s,cx,baseY,r}=machineMetrics(w,h);initBalls(w,baseY,r,s);const force=stepBalls(cx,baseY,r,s,dt,now);if(state===STATES.SPINNING)syncShuffleAudio(force);const target=state===STATES.SPINNING?Math.sin(age(now)*.018)*1.1:0;leverAngle+=(target-leverAngle)*Math.min(1,dt*(state===STATES.EXITING?.018:.012));const glass=ctx.createRadialGradient(cx-r*.35,baseY-r*1.1,18,cx,baseY-r*.75,r*1.25);glass.addColorStop(0,"rgba(255,255,255,.62)");glass.addColorStop(.55,"rgba(144,226,235,.18)");glass.addColorStop(1,"rgba(255,255,255,.06)");ctx.fillStyle=glass;ctx.beginPath();ctx.arc(cx,baseY-r*.7,r,0,Math.PI*2);ctx.fill();balls.forEach(drawBall);ctx.strokeStyle="rgba(220,255,255,.62)";ctx.lineWidth=4*s;ctx.stroke();const lidY=baseY-r*1.82,lidW=238*s,lidH=38*s;const lid=ctx.createLinearGradient(cx,lidY,cx,lidY+lidH);lid.addColorStop(0,"#8af276");lid.addColorStop(.42,"#38ad45");lid.addColorStop(1,"#126b31");ctx.fillStyle="rgba(4,48,28,.82)";rr(cx-lidW*.51,lidY+lidH*.48,lidW*1.02,lidH*.58,14*s);ctx.fill();ctx.fillStyle=lid;rr(cx-lidW*.5,lidY,lidW,lidH,18*s);ctx.fill();ctx.strokeStyle="rgba(212,255,188,.72)";ctx.lineWidth=3*s;ctx.stroke();ctx.fillStyle="rgba(255,255,255,.34)";rr(cx-lidW*.4,lidY+5*s,lidW*.62,6*s,3*s);ctx.fill();const base=ctx.createLinearGradient(cx,baseY-40*s,cx,baseY+142*s);base.addColorStop(0,"#65d463");base.addColorStop(.55,"#279245");base.addColorStop(1,"#126733");ctx.fillStyle=base;rr(cx-164*s,baseY-44*s,328*s,174*s,24*s);ctx.fill();ctx.save();ctx.translate(cx,baseY+48*s);ctx.rotate(leverAngle);ctx.fillStyle="#c8cecd";ctx.strokeStyle="#596164";ctx.lineWidth=4*s;ctx.beginPath();ctx.arc(0,0,37*s,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle="#747d7f";rr(-5*s,-31*s,10*s,62*s,5*s);ctx.fill();rr(-31*s,-5*s,62*s,10*s,5*s);ctx.fill();ctx.restore();ctx.fillStyle="#073923";ctx.beginPath();ctx.ellipse(cx,baseY+118*s,54*s,34*s,0,0,Math.PI*2);ctx.fill();if([STATES.BALL_FALL,STATES.CAPSULE_OPEN,STATES.SHOW_PAPER,STATES.EXITING].includes(state)){const p=Math.min(1,age(now)/600),y=state===STATES.BALL_FALL?baseY+115*s+p*h*.13-Math.sin(p*Math.PI)*18:h*.82,open=state!==STATES.BALL_FALL,split=open?34*s:0,cr=39*s;ctx.save();ctx.shadowColor=open?"#b4ff87":"transparent";ctx.shadowBlur=open?35:0;ctx.fillStyle="#8ee75e";ctx.beginPath();ctx.arc(cx-split,y,cr,Math.PI*.5,Math.PI*1.5);ctx.arc(cx,y,cr,Math.PI*1.5,Math.PI*.5);ctx.fill();ctx.fillStyle="rgba(255,255,255,.5)";ctx.beginPath();ctx.arc(cx+split,y,cr,Math.PI*1.5,Math.PI*.5);ctx.arc(cx,y,cr,Math.PI*.5,Math.PI*1.5);ctx.fill();ctx.restore()}}
async function prepareAudio(){if(shuffleBuffer||!audioCtx)return;try{const r=await fetch(AUDIO.shuffle,{mode:"cors"});if(!r.ok)throw 0;shuffleBuffer=await audioCtx.decodeAudioData(await r.arrayBuffer())}catch{const len=Math.floor(audioCtx.sampleRate*.6),buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(len*.22));shuffleBuffer=buf}}
function startShuffle(){if(!audioCtx||!shuffleBuffer)return;stopShuffle();shuffleGain=audioCtx.createGain();shuffleGain.gain.value=.001;shuffleGain.connect(audioCtx.destination);shuffleSource=audioCtx.createBufferSource();shuffleSource.buffer=shuffleBuffer;shuffleSource.loop=true;shuffleSource.playbackRate.value=1.9;shuffleSource.connect(shuffleGain);shuffleSource.start()}
function syncShuffleAudio(force){if(!audioCtx||!shuffleSource||!shuffleGain)return;const now=audioCtx.currentTime,g=.2+.8*force,rate=.42+1.48*Math.pow(force,1.8);shuffleGain.gain.cancelScheduledValues(now);shuffleGain.gain.linearRampToValueAtTime(g,now+.06);shuffleSource.playbackRate.cancelScheduledValues(now);shuffleSource.playbackRate.exponentialRampToValueAtTime(Math.max(.2,rate),now+.07)}
function stopShuffle(){if(shuffleSource){try{shuffleSource.stop()}catch{}shuffleSource.disconnect();shuffleSource=null}if(shuffleGain){shuffleGain.disconnect();shuffleGain=null}}
async function unlockAudio(){await ensureAudioContext();audioUnlocked=true;if(bgm.paused){bgm.currentTime=0;try{await bgm.play()}catch{startFallbackBgm()}}await prepareAudio();if(state===STATES.SPINNING&&!shuffleSource)startShuffle()}
function render(now){animationId=0;const dt=lastFrame?now-lastFrame:16.667;lastFrame=now;ctx.clearRect(0,0,innerWidth,innerHeight);const bg=ctx.createLinearGradient(0,0,0,innerHeight);bg.addColorStop(0,"#113835");bg.addColorStop(.52,"#1a5652");bg.addColorStop(1,"#071f20");ctx.fillStyle=bg;ctx.fillRect(0,0,innerWidth,innerHeight);ctx.strokeStyle="rgba(123,222,224,.14)";for(let i=0;i<12;i++){const y=innerHeight*.48+i*innerHeight*.045+Math.sin(now*.001+i)*8;ctx.beginPath();for(let x=-20;x<innerWidth+20;x+=24){const yy=y+Math.sin(x*.018+now*.0017+i)*6;x===-20?ctx.moveTo(x,yy):ctx.lineTo(x,yy)}ctx.stroke()}machine(innerWidth,innerHeight,now,dt);lotus(innerWidth*.18,innerHeight*.88,Math.min(innerWidth/820,.9),now,-1);lotus(innerWidth*.82,innerHeight*.88,Math.min(innerWidth/820,.9),now,1);ripples=ripples.filter(r=>{const a=now-r.born;if(a>1200)return false;const p=Math.max(0,a/1200);ctx.strokeStyle=`rgba(136,220,255,${.46*(1-p)})`;for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(r.x,r.y,p*180+i*24,0,Math.PI*2);ctx.stroke()}return true});if(state===STATES.SPINNING)progressFill.style.width=Math.min(100,age(now)/30)+"%";animationId=requestAnimationFrame(render)}
function ensureLoop(){if(!animationId)animationId=requestAnimationFrame(render)}
function startPull(){if(state!==STATES.READY||!pool.length)return;const i=nextDrawIndex(),chosen=pool[i];pool=pool.filter((_,n)=>n!==i);pullCount++;nameEl.textContent=chosen;fortuneEl.textContent=fortunes[Math.floor(Math.random()*fortunes.length)];paperWrap.classList.remove("active","exiting");progressFill.style.width="0%";transition(STATES.SPINNING);balls.forEach((b,i)=>{const angle=i/balls.length*Math.PI*2,side=i%2?1:-1;b.vx=Math.cos(angle)*5+side*3;b.vy=-5-Math.sin(angle)*3-Math.random()*4;b.omega=side*(.12+Math.random()*.18)});startShuffle();setTimeout(()=>{stopShuffle();transition(STATES.BALL_FALL)},3000);setTimeout(()=>transition(STATES.CAPSULE_OPEN),3600);setTimeout(()=>playOverlap(tadaSfx,.95,"tada"),4300);setTimeout(()=>{transition(STATES.SHOW_PAPER);paperWrap.classList.add("active");playOverlap(paperSfx,.7,"click")},4500)}
function closePaper(){if(state!==STATES.SHOW_PAPER)return;transition(STATES.EXITING);paperWrap.classList.add("exiting");balls.forEach((b,i)=>{b.vx+=(Math.random()-.5)*.7;b.vy-=.15+Math.sin(i)*.08});ensureLoop();setTimeout(()=>{paperWrap.classList.remove("active","exiting");leverAngle=0;transition(STATES.READY)},500)}
app.addEventListener("pointerdown",e=>{unlockAudio();ripples.push({x:e.clientX,y:e.clientY,born:performance.now()});if(e.target.closest("[data-suggestion]")||e.target.closest("[data-volume]")||e.target.closest("#reset"))return;const leverClicked=isLeverHit(e.clientX,e.clientY);if(leverClicked)playOverlap(clickSfx,.9,"click");if(state===STATES.READY)startPull();else if(state===STATES.SHOW_PAPER)closePaper()});
document.querySelector("[data-suggestion]").onclick=()=>window.open("https://www.instagram.com/koreanastrology?igsh=cWphNHprZGFwcGw2","_blank");document.getElementById("reset").onclick=e=>{e.stopPropagation();pool=[...influencers];pullCount=0;paperWrap.classList.remove("active","exiting");transition(STATES.READY)};
updateUI();ensureLoop();loadTrendPool();
